name: Official Release on Tag

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: yukazaki/koakademy

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version from pushed tag
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG' is not a supported semver release tag."
            exit 1
          fi

          echo "Resolved version: $VERSION"
          echo "Resolved tag: $TAG"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-24.04
    needs: prepare
    if: needs.prepare.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest
            type=raw,value=stable-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            org.opencontainers.image.title=KoAcademy
            org.opencontainers.image.description=Divine Cross College Portal - Admin Dashboard V3
            org.opencontainers.image.vendor=KOA

      - name: Build and push Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            APP_NAME=KoAcademy
            APP_ENV=production
            APP_DEBUG=false
            APP_URL=https://koakademy.yukazaki.com

  create-release:
    runs-on: ubuntu-24.04
    needs: [prepare, build-and-push]
    if: needs.build-and-push.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes (PRs + commits)
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG;
            const version = process.env.VERSION;
            const registry = process.env.REGISTRY;
            const imageName = process.env.IMAGE_NAME;

            const isStableTag = (value) => /^(v)?\d+\.\d+\.\d+$/.test(value || '');
            const firstLine = (value) => (value || '').split('\n')[0].trim();

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const officialReleases = releases
              .filter((release) => !release.draft && !release.prerelease)
              .filter((release) => isStableTag(release.tag_name))
              .filter((release) => release.tag_name !== tag)
              .sort((a, b) => new Date(b.published_at || b.created_at) - new Date(a.published_at || a.created_at));

            const baseTag = officialReleases[0]?.tag_name || null;

            let commits = [];
            if (baseTag) {
              const compare = await github.rest.repos.compareCommits({
                owner,
                repo,
                base: baseTag,
                head: context.sha,
              });
              commits = compare.data.commits || [];
            } else {
              const list = await github.rest.repos.listCommits({
                owner,
                repo,
                sha: context.sha,
                per_page: 100,
              });
              commits = list.data || [];
            }

            const skippedBySha = new Set();
            const prByNumber = new Map();
            const commitWithAssociatedPr = new Set();

            for (const commit of commits) {
              const sha = commit.sha;
              const subject = firstLine(commit.commit?.message);

              const authorLogin = commit.author?.login || '';
              const committerLogin = commit.committer?.login || '';
              const committerName = commit.commit?.committer?.name || '';

              const isGithubActions =
                authorLogin === 'github-actions[bot]' ||
                committerLogin === 'github-actions[bot]' ||
                committerName === 'github-actions[bot]';

              const isVersionBump = /^chore: update version to\s+/i.test(subject);
              const hasSkipCi = /\[skip ci\]/i.test(subject);

              if (isGithubActions || isVersionBump || hasSkipCi) {
                skippedBySha.add(sha);
                continue;
              }

              try {
                const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: sha,
                  mediaType: {
                    previews: ['groot'],
                  },
                });

                const mergedPr = (associated.data || []).find((pr) => pr.merged_at);
                if (mergedPr) {
                  prByNumber.set(mergedPr.number, mergedPr);
                  commitWithAssociatedPr.add(sha);
                }
              } catch {
                // Commits may have no associated PRs.
              }
            }

            const categories = {
              'Breaking Changes': [],
              Features: [],
              Fixes: [],
              Refactors: [],
              Docs: [],
              Chores: [],
              Other: [],
            };

            const categoryForPr = (pr) => {
              const labels = (pr.labels || []).map((label) => (typeof label === 'string' ? label : label.name)).filter(Boolean);
              const normalized = labels.map((label) => String(label).toLowerCase());

              const has = (needle) => normalized.some((label) => label === needle || label.includes(needle));

              if (has('breaking') || has('major')) {
                return 'Breaking Changes';
              }
              if (has('feature') || has('enhancement') || has('feat')) {
                return 'Features';
              }
              if (has('fix') || has('bug') || has('bugfix') || has('hotfix')) {
                return 'Fixes';
              }
              if (has('refactor')) {
                return 'Refactors';
              }
              if (has('docs') || has('documentation')) {
                return 'Docs';
              }
              if (has('chore') || has('ci') || has('build')) {
                return 'Chores';
              }

              return 'Other';
            };

            const prs = Array.from(prByNumber.values()).sort((a, b) => a.number - b.number);
            for (const pr of prs) {
              categories[categoryForPr(pr)].push(pr);
            }

            const nonPrCommits = commits
              .filter((commit) => !skippedBySha.has(commit.sha))
              .filter((commit) => !commitWithAssociatedPr.has(commit.sha))
              .map((commit) => ({
                sha: commit.sha,
                subject: firstLine(commit.commit?.message),
              }));

            const compareUrl = baseTag
              ? `${context.serverUrl}/${owner}/${repo}/compare/${baseTag}...${tag}`
              : null;

            const lines = [];
            lines.push(`# KoAcademy ${tag} (Official Release)`);
            lines.push('');
            lines.push('✅ **Channel:** Official');
            lines.push(`📦 **Version:** ${version}`);
            lines.push(`🐳 **Docker Image:** ${registry}/${imageName}:${tag}`);
            if (compareUrl) {
              lines.push(`🔎 **Compare:** ${compareUrl}`);
            }
            lines.push('');

            lines.push('## Pull Requests');
            lines.push('');

            const prLine = (pr) => {
              const login = pr.user?.login ? `@${pr.user.login}` : '@unknown';
              return `- ${pr.title} (#${pr.number}) (${login})`;
            };

            const categoryOrder = Object.keys(categories);
            let anyPrs = false;
            for (const key of categoryOrder) {
              const group = categories[key];
              if (!group.length) {
                continue;
              }

              anyPrs = true;
              lines.push(`### ${key}`);
              for (const pr of group) {
                lines.push(prLine(pr));
              }
              lines.push('');
            }

            if (!anyPrs) {
              lines.push('- (No merged pull requests detected in this range)');
              lines.push('');
            }

            lines.push('## Commits (not in a PR)');
            lines.push('');
            if (nonPrCommits.length) {
              for (const commit of nonPrCommits) {
                lines.push(`- ${commit.subject} (${commit.sha.slice(0, 7)})`);
              }
            } else {
              lines.push('- (No direct commits detected)');
            }
            lines.push('');

            lines.push('---');
            lines.push(`🤖 *Tag release triggered by ${context.actor}*`);
            lines.push(`📊 *Build: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}*`);
            lines.push('');

            fs.writeFileSync('RELEASE_NOTES.md', lines.join('\n'));

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: KoAcademy ${{ needs.prepare.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            version.json
          generate_release_notes: false
