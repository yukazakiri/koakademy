http:
  routers:
    # Portal (Laravel app)
    portal-secure:
      rule: "Host(`portal.koakademy.test`)"
      entrypoints:
        - websecure
      service: app
      tls: true
    portal-http:
      rule: "Host(`portal.koakademy.test`)"
      entrypoints:
        - web
      service: app
      middlewares:
        - redirect-websecure

    # Admin (Laravel app)
    admin-secure:
      rule: "Host(`admin.koakademy.test`)"
      entrypoints:
        - websecure
      service: app
      tls: true
    admin-http:
      rule: "Host(`admin.koakademy.test`)"
      entrypoints:
        - web
      service: app
      middlewares:
        - redirect-websecure

    # Mailpit
    mailpit-secure:
      rule: "Host(`mailpit.local.test`)"
      entrypoints:
        - websecure
      service: mailpit
      tls: true
    mailpit-http:
      rule: "Host(`mailpit.local.test`)"
      entrypoints:
        - web
      service: mailpit

  services:
    app:
      loadBalancer:
        servers:
          - url: "http://laravel.test:80"
    mailpit:
      loadBalancer:
        servers:
          - url: "http://mailpit:8025"

  middlewares:
    redirect-websecure:
      redirectScheme:
        scheme: https
        permanent: true

tls:
  certificates:
    - certFile: /etc/traefik/certs/koakademy.test.pem
      keyFile: /etc/traefik/certs/koakademy.test-key.pem
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/koakademy.test.pem
        keyFile: /etc/traefik/certs/koakademy.test-key.pem
