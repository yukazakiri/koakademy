name: Feature request
description: Suggest an idea for KoAcademy
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search the existing issues (both open and closed) to see if it has already been suggested.

        ---

        Thank you for taking the time to suggest a feature.
  - type: dropdown
    id: area
    attributes:
      label: Area / Module
      description: Which area of KoAcademy would this feature apply to?
      options:
        - General
        - Admin Panel
        - Student Portal
        - Enrollment
        - Billing / Cashier
        - Library System
        - Medical Records
        - Notifications
        - Announcements
        - API
        - Other
      default: 0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: Describe the feature you'd like to see.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? How would you use it?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: If you have an idea of how this could be implemented, describe it here.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Have you considered any alternative solutions or workarounds?
