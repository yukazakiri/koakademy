server {
    listen 80;
    listen [::]:80;
    server_name portal.dccp.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.dccp.com;

    ssl_certificate /home/admin/DccpAdminV3/storage/certs/dccp.com.pem;
    ssl_certificate_key /home/admin/DccpAdminV3/storage/certs/dccp.com-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /home/admin/DccpAdminV3/public;
    index index.php;

    charset utf-8;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /home/admin/DccpAdminV3/storage/logs/nginx-portal-access.log;
    error_log /home/admin/DccpAdminV3/storage/logs/nginx-portal-error.log;
}
